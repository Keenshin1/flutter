name: Build index.html

on:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'assets/**'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Run build.py
        run: python build.py

      - name: Commit index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "ci: rebuild index.html [skip ci]"
          git push
